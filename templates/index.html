<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galgame Demo</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/static/js/script.js"></script>
</head>
<body>
    <div id="game">
        <audio id="voice-player" hidden></audio>
        <img id="background" src="/static/images/bg.jpg" alt="background">
        <div id="live2d-container">
            <canvas id="canvas2"></canvas>
        </div>

        <div id="main-frame">
            <div id="dialogue-box">
                <p id="dialogue">你好，欢迎来到这个世界！</p>
            </div>

            <div id="input-area">
                <input type="text" id="user-input" placeholder="请输入内容..." />
                <button id="submit-btn">提交</button>
            </div>
        </div>

        <div id="options-frame">
            <div id="option-agent" class="option-btn" onclick="toggleAgentMode()">
                <span class="option-icon">⚡</span>
                <span class="option-text">Agent</span>
            </div>
            <div id="option-token" class="option-btn" onclick="showTokenInfo()">
                <span class="option-icon">💎</span>
                <span class="option-text">Tokens</span>
            </div>
            <div id="option-log" class="option-btn" onclick="toggleLogPanel()">
                <span class="option-icon">📜</span>
                <span class="option-text">History</span>
            </div>
        </div>

        <div id="tool-call-display"></div>

        <div id="token-panel" class="sub-panel hidden">
            <div class="panel-header">
                <span>Token 消耗</span>
                <button class="panel-close" onclick="hideTokenInfo()">&times;</button>
            </div>
            <div id="token-content">
                <div class="token-item">
                    <span class="token-label">输入 Tokens</span>
                    <span id="token-prompt" class="token-value">0</span>
                </div>
                <div class="token-item">
                    <span class="token-label">输出 Tokens</span>
                    <span id="token-completion" class="token-value">0</span>
                </div>
                <div class="token-item total">
                    <span class="token-label">总计</span>
                    <span id="token-total" class="token-value">0</span>
                </div>
            </div>
        </div>

        <div id="log-panel" class="sub-panel hidden">
            <div class="panel-header">
                <span>历史记录</span>
                <button class="panel-close" onclick="toggleLogPanel()">&times;</button>
            </div>
            <div id="log-content"></div>
        </div>
    </div>
    <audio id="bgm" src="/static/audio/bgm.ogg" loop></audio>
</body>
</html>
